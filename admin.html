<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Control Center</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>🛠 Admin Control</h1>
        <a href="index.html" style="color: #00ff88;">View Main Site</a>
    </header>

    <main>
        <section class="admin-box">
            <h2>📢 Post News</h2>
            <input type="text" id="news-title" placeholder="Match Title (e.g. Finals Today!)">
            <textarea id="news-content" placeholder="Details..."></textarea>
            <button onclick="postNews()">Post Announcement</button>
        </section>

        <section class="admin-box">
            <h2>📈 Update Team Stats</h2>
            <select id="team-select">
                </select>
            <div class="stats-inputs">
                <input type="number" id="edit-wins" placeholder="Wins">
                <input type="number" id="edit-draws" placeholder="Draws">
                <input type="number" id="edit-losses" placeholder="Losses">
            </div>
            <button onclick="updateStats()">Save Stats</button>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
