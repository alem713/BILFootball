<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚽ ЖЕРЕБЬЁВКА <span>HUB</span></h1>
    </header>

    <div class="main-container">
        <section class="section-box">
            <h2 class="neon-text">📢 NEWS</h2>
            <div id="news-list"></div>
        </section>

        <section class="section-box">
            <h2 class="neon-text">📊 LEADERBOARD</h2>
            <table>
                <thead>
                    <tr>
                        <th>TEAM</th>
                        <th>WINS</th>
                        <th>PTS</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </section>

        <section class="section-box">
            <h2 class="neon-text">👥 TEAM ROSTERS</h2>
            <div id="teams-grid" class="grid"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
